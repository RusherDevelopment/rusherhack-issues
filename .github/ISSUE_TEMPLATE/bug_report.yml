name: Bug Report
description: Report a bug that you have found in RusherHack
title: "[BUG] "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Minecraft Version
      description: What version(s) of Minecraft did you encounter this issue on?
      multiple: true
      options:
        - 1.21.11
        - 1.21.4
        - 1.21.3
        - 1.21.1
        - 1.20.6
        - 1.20.4
        - 1.20.2
        - 1.20.1
        - 1.12.2

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.

  - type: textarea
    id: mods
    attributes:
      label: Other Mods
      description: Please list all other Fabric mods installed
      render: shell

  - type: upload
    id: media
    attributes:
      label: Media
      description: If applicable, add a screenshot or video to help explain your problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
