name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What versions of Minecraft does this issue affect?
      multiple: true
      options:
        - 1.21.11
        - 1.21.4
        - 1.21.3
        - 1.21.1
        - 1.20.6
        - 1.20.4
        - 1.20.2
        - 1.20.1
        - 1.12.2

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: textarea
    id: mods
    attributes:
      label: Other Mods installed
      description: Please list all other mods installed
      render: shell

  - type: upload
    id: media
    attributes:
      label: Upload media
      description: If applicable, add media to help explain your problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
