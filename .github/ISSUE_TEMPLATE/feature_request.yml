name: Feature Request
description: Suggest a feature to be added to RusherHack
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you would like to see added in detail
    validations:
      required: true

  - type: upload
    id: media
    attributes:
      label: Media
      description: If applicable, add a screenshot or video to help explain your feature request.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
