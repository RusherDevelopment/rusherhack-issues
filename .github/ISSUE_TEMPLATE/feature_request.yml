name: Feature request
description: Suggest a feature for RusherHack
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: description
    attributes:
      label: Feature request
      description: What feature would you like to be added?
      placeholder: Describe the feature in detail...
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Relate Issue
      description: Is your feature request related to a problem?

  - type: upload
    id: media
    attributes:
      label: Upload media
      description: If applicable, add media to help explain your feature request.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
